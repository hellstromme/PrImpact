name: PrImpact Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  analyse:
    name: Analyse PR impact
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      actions: read
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pr-impact
        run: pip install .

      - name: Run PrImpact analysis
        id: analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr-impact analyse \
            --repo . \
            --pr ${{ github.event.pull_request.number }} \
            --output pr_impact_report.md \
            --json pr_impact_report.json \
            --sarif pr_impact_report.sarif \
            --fail-on-severity high

      - name: Post report as PR comment
        if: always() && steps.analysis.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          [ -f pr_impact_report.md ] || exit 0
          MARKER="<!-- pr-impact-report -->"
          SUMMARY=$(awk 'NR==2{gsub(/^[# ]+/, ""); print}' pr_impact_report.md)
          BODY="${MARKER}
          <details>
          <summary>PrImpact Report — ${SUMMARY}</summary>

          $(cat pr_impact_report.md)
          </details>"

          # Look for an existing comment with our marker
          COMMENT_ID=$(gh api \
            repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" \
            | head -1)

          if [ -n "$COMMENT_ID" ]; then
            # Update the existing comment
            gh api repos/${{ github.repository }}/issues/comments/"$COMMENT_ID" \
              -X PATCH \
              -f body="$BODY"
          else
            # Post a new comment
            gh pr comment ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --body "$BODY"
          fi

      - name: Upload report artefacts
        if: always() && steps.analysis.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: pr-impact-report
          path: |
            pr_impact_report.md
            pr_impact_report.json
            pr_impact_report.sarif
          retention-days: 30
          if-no-files-found: ignore

  upload-sarif:
    name: Upload SARIF to GitHub Security tab
    needs: analyse
    runs-on: ubuntu-latest
    if: |
      needs.analyse.result == 'success' &&
      github.repository == github.event.pull_request.head.repo.full_name
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Download report artefacts
        uses: actions/download-artifact@v4
        with:
          name: pr-impact-report

      - name: Upload SARIF
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pr_impact_report.sarif
          category: primpact
