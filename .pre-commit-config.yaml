repos:
  - repo: local
    hooks:
      - id: detect-secrets
        name: detect-secrets
        language: system
        entry: python -c "from detect_secrets.pre_commit_hook import main; main()"
        args: ["--baseline", ".secrets.baseline"]

      - id: ruff-check
        name: ruff (lint)
        language: system
        entry: python -m ruff check --fix
        types: [python]

      - id: ruff-format
        name: ruff (format)
        language: system
        entry: python -m ruff format
        types: [python]

      - id: pyright
        name: pyright
        language: system
        entry: python -m pyright
        types: [python]
        pass_filenames: false
        args: [pr_impact/]
