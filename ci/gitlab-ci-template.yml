# PrImpact GitLab CI Template
#
# Copy this job into your .gitlab-ci.yml, or include it:
#
#   include:
#     - project: 'your-group/PrImpact'
#       file: 'ci/gitlab-ci-template.yml'
#
# Required CI/CD variable (Settings → CI/CD → Variables):
#   ANTHROPIC_API_KEY  — your Anthropic API key
#   GITLAB_TOKEN       — a project/group access token with api scope
#                        (used to post the MR comment; CI_JOB_TOKEN lacks notes write access)

primpact:
  stage: test
  image: python:3.12-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  cache:
    key: primpact-pip
    paths:
      - .cache/pip
  before_script:
    - pip install pr-impact
  script:
    - |
      pr-impact analyse \
        --repo . \
        --base "$CI_MERGE_REQUEST_DIFF_BASE_SHA" \
        --head "$CI_COMMIT_SHA" \
        --output pr_impact_report.md \
        --json pr_impact_report.json
  after_script:
    # Post the report as a collapsible MR note (upsert: update if already posted)
    - |
      [ -f pr_impact_report.md ] || exit 0
      if [ -z "${GITLAB_TOKEN:-}" ]; then
        echo "WARNING: GITLAB_TOKEN is not set — skipping MR note posting." >&2
        exit 0
      fi
      MARKER="<!-- pr-impact-report -->"
      NOTE_BODY="${MARKER}
      <details>
      <summary>PrImpact Report</summary>

      $(cat pr_impact_report.md)

      </details>"

      EXISTING_NOTE_ID=$(curl -sf \
        --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/notes?per_page=100" \
        | python3 -c "
      import sys, json
      notes = json.load(sys.stdin)
      marker = '<!-- pr-impact-report -->'
      print(next((str(n['id']) for n in notes if n['body'].startswith(marker)), ''))
      ")

      if [ -n "$EXISTING_NOTE_ID" ]; then
        curl -sf -X PUT \
          --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
          --data-urlencode "body=$NOTE_BODY" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/notes/$EXISTING_NOTE_ID"
      else
        curl -sf -X POST \
          --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
          --data-urlencode "body=$NOTE_BODY" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/notes"
      fi
  artifacts:
    when: always
    paths:
      - pr_impact_report.md
      - pr_impact_report.json
    expire_in: 30 days
  allow_failure: false  # PrImpact is advisory-only; anomalies appear in the report but never block the MR
